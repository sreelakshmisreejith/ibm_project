<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDTRACE FORENSICS — Secure Terminal Access</title>
  <meta name="description" content="MedTrace Healthcare Forensics — Authorized personnel only. Secure terminal authentication.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-cyan: #00f5ff;
      --neon-green: #00ff88;
      --neon-red: #ff2255;
      --neon-blue: #4d9fff;
      --bg-primary: #050810;
      --bg-secondary: #0a0e1a;
      --bg-glass: rgba(10, 20, 40, 0.85);
      --border-glow: rgba(0, 245, 255, 0.3);
      --text-primary: #e2e8f0;
      --text-muted: #64748b;
    }

    body {
      background: var(--bg-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Particle canvas */
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Scan line effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.03) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 600px; height: 600px; background: rgba(0, 245, 255, 0.06); top: -200px; left: -200px; animation: orbFloat 10s ease-in-out infinite; }
    .orb-2 { width: 500px; height: 500px; background: rgba(77, 159, 255, 0.06); bottom: -150px; right: -150px; animation: orbFloat 12s ease-in-out infinite reverse; }
    .orb-3 { width: 300px; height: 300px; background: rgba(0, 255, 136, 0.04); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: orbFloat 15s ease-in-out infinite; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -20px); }
      66% { transform: translate(-20px, 10px); }
    }

    /* Corner decorations */
    .corner { position: fixed; width: 80px; height: 80px; z-index: 2; }
    .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
    .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }

    /* Status bar */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 245, 255, 0.05);
      border-top: 1px solid rgba(0, 245, 255, 0.15);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      z-index: 10;
    }
    .status-bar .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Login wrapper */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Login card */
    .login-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow:
        0 0 60px rgba(0, 245, 255, 0.08),
        0 25px 50px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      animation: scanLine 4s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; box-shadow: 0 0 20px var(--neon-cyan); }
    }

    /* Header */
    .login-header { text-align: center; margin-bottom: 36px; }

    .shield-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(0, 245, 255, 0.08);
      border: 1.5px solid rgba(0, 245, 255, 0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      position: relative;
      animation: shieldRotate 6s ease-in-out infinite;
    }
    .shield-wrap::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(0, 245, 255, 0.15);
      animation: shieldRotate 8s linear infinite reverse;
    }
    @keyframes shieldRotate {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 245, 255, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.05); }
      50% { box-shadow: 0 0 40px rgba(0, 245, 255, 0.4), inset 0 0 30px rgba(0, 245, 255, 0.1); }
    }
    .shield-wrap svg { width: 32px; height: 32px; color: var(--neon-cyan); fill: var(--neon-cyan); }

    .login-title {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .login-title span { color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }

    .login-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Error alert */
    .error-alert {
      background: rgba(255, 34, 85, 0.1);
      border: 1px solid rgba(255, 34, 85, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--neon-red);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: errorShake 0.4s ease-in-out;
    }
    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
    }
    .error-alert svg { width: 16px; height: 16px; flex-shrink: 0; fill: var(--neon-red); }

    /* Form inputs */
    .field-group { margin-bottom: 20px; }
    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--neon-cyan);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: color 0.3s;
    }
    .input-icon svg { width: 16px; height: 16px; fill: currentColor; display: block; }
    .cyber-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 8px;
      padding: 13px 14px 13px 42px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    .cyber-input::placeholder { color: rgba(100, 116, 139, 0.6); }
    .cyber-input:focus {
      border-color: var(--neon-cyan);
      background: rgba(0, 245, 255, 0.03);
      box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.08), 0 0 20px rgba(0, 245, 255, 0.1);
    }
    .cyber-input:focus ~ .input-border { transform: scaleX(1); }
    .input-wrap:focus-within .input-icon { color: var(--neon-cyan); }

    /* Submit button */
    .btn-uplink {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(0, 245, 255, 0.05));
      border: 1px solid rgba(0, 245, 255, 0.5);
      border-radius: 8px;
      color: var(--neon-cyan);
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }
    .btn-uplink::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.3), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-uplink:hover {
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.3), 0 0 60px rgba(0, 245, 255, 0.1);
      transform: translateY(-1px);
    }
    .btn-uplink:hover::before { opacity: 1; }
    .btn-uplink:active { transform: translateY(0); }
    .btn-uplink-inner { display: flex; align-items: center; justify-content: center; gap: 10px; position: relative; z-index: 1; }
    .btn-uplink svg { width: 16px; height: 16px; fill: currentColor; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    .login-footer p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
    }
    .secure-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 12px;
      background: rgba(0, 255, 136, 0.05);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--neon-green);
      letter-spacing: 1px;
    }
    .secure-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: pulse 2s infinite; }

    /* Matrix rain canvas */
    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.04;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <canvas id="matrix-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="shield-wrap">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
        </div>
        <h1 class="login-title">MEDTRACE <span>FORENSICS</span></h1>
        <p class="login-subtitle">// Secure System Terminal</p>
      </div>

      {% if error %}
      <div class="error-alert">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form action="{{ url_for('login') }}" method="POST">
        <div class="field-group">
          <label class="field-label" for="username">// Agent Identifier</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </span>
            <input type="text" class="cyber-input" id="username" name="username" placeholder="Enter agent ID" required autocomplete="off">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">// Access Passcode</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </span>
            <input type="password" class="cyber-input" id="password" name="password" placeholder="Enter passcode" required>
          </div>
        </div>

        <button type="submit" class="btn-uplink">
          <div class="btn-uplink-inner">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            INITIALIZE UPLINK
          </div>
        </button>
      </form>

      <div class="login-footer">
        <p>RESTRICTED ACCESS — AUTHORIZED PERSONNEL ONLY</p>
        <div class="secure-badge">
          <span class="secure-dot"></span>
          AES-256 ENCRYPTED SESSION
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span>SYS ONLINE</span>
    <span style="color: rgba(0,245,255,0.4)">|</span>
    <span id="sys-time">--:--:-- UTC</span>
    <span style="color: rgba(0,245,255,0.4)">|</span>
    <span>MEDTRACE FORENSICS v2.0.1</span>
    <span style="color: rgba(0,245,255,0.4)">|</span>
    <span>END-TO-END SECURED</span>
  </div>

  <script>
    // Update clock
    function updateClock() {
      const now = new Date();
      document.getElementById('sys-time').textContent = now.toUTCString().slice(17, 25) + ' UTC';
    }
    setInterval(updateClock, 1000); updateClock();

    // Matrix rain
    (function() {
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ'.split('');
      const fontSize = 13;
      const cols = Math.floor(canvas.width / fontSize);
      const drops = Array(cols).fill(0);
      function draw() {
        ctx.fillStyle = 'rgba(5,8,16,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00f5ff';
        ctx.font = fontSize + 'px JetBrains Mono';
        drops.forEach((y, i) => {
          const text = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(text, i * fontSize, y * fontSize);
          if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
          else drops[i]++;
        });
      }
      setInterval(draw, 60);
      window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    })();

    // Particles
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const particles = Array.from({ length: 60 }, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.1
      }));
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,245,255,${p.alpha})`;
          ctx.fill();
        });
        // Draw connecting lines
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(0,245,255,${0.06 * (1 - dist/120)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
      window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    })();
  </script>
</body>
</html>
